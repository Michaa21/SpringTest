spring:
  application:
    name: SpringTest

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/spring_test
    username: postgres
    password: 123456

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: spring_test
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: spring_test
    default-schema: spring_test

logging:
  level:
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
