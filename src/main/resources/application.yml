spring:
  application:
    name: SpringTest

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/spring_test
    username: postgres
    password: 123456

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        default_schema: spring_test

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: spring_test
    default-schema: spring_test
